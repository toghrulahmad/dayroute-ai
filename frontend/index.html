<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayRoute AI — Bir Günlük Bilet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --night-deep: #0d1526;
    --night: #16213e;
    --night-soft: #223159;
    --gold: #e8a33d;
    --gold-soft: #f2c375;
    --terracotta: #c1502e;
    --paper: #f3ead8;
    --paper-dim: #e8dcc2;
    --ink: #2b2318;
    --ink-soft: #6b5f4c;
    --teal: #2f6b5e;
    --stub-width: 220px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--night-deep);
    font-family: 'Inter', sans-serif;
    color: var(--paper);
    overflow-x: hidden;
  }

  body {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  .sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(232,163,61,0.10), transparent 45%),
      linear-gradient(180deg, var(--night-deep) 0%, var(--night) 55%, var(--night-soft) 100%);
  }

  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%, #fff, transparent),
      radial-gradient(1px 1px at 25% 55%, #fff, transparent),
      radial-gradient(2px 2px at 40% 12%, #fff, transparent),
      radial-gradient(1px 1px at 60% 30%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 75% 60%, #fff, transparent),
      radial-gradient(1px 1px at 85% 15%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 92% 45%, #fff, transparent),
      radial-gradient(1px 1px at 15% 75%, #fff, transparent),
      radial-gradient(1px 1px at 50% 80%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 65% 8%, #fff, transparent);
    opacity: 0.55;
    animation: twinkle 5s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.35; }
    to { opacity: 0.7; }
  }

  .skyline {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 190px;
    z-index: 1;
    pointer-events: none;
  }
  .skyline svg { width: 100%; height: 100%; display: block; }
  .skyline-fill { fill: #0a1120; }
  .skyline-fill-2 { fill: #0c1526; opacity: 0.85; }

  .top {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 40px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-bottom: 14px;
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(40px, 7vw, 68px);
    line-height: 1;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .brand em {
    font-style: italic;
    font-weight: 500;
    color: var(--gold);
  }

  .tagline {
    margin-top: 14px;
    font-size: 15px;
    color: rgba(243,234,216,0.65);
    font-family: 'Inter', sans-serif;
  }
.pass-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 900px;
  }

  .pass {
    display: grid;
    grid-template-columns: 1fr var(--stub-width);
    background: var(--paper);
    color: var(--ink);
    border-radius: 18px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.04);
    overflow: hidden;
    position: relative;
  }

  .pass-main {
    padding: 34px 38px 30px;
    position: relative;
  }

  .pass-stub {
    background: var(--paper-dim);
    padding: 34px 26px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  .perforation {
    position: absolute;
    top: 0; bottom: 0;
    right: var(--stub-width);
    width: 0;
    border-left: 2px dashed rgba(43,35,24,0.25);
  }
  .notch {
    position: absolute;
    right: calc(var(--stub-width) - 11px);
    width: 22px; height: 22px;
    background: var(--night-deep);
    border-radius: 50%;
    z-index: 3;
  }
  .notch.top { top: -11px; }
  .notch.bottom { bottom: -11px; }

  .row-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
    display: block;
  }

  .field {
    margin-bottom: 22px;
  }

  .field input {
    width: 100%;
    border: none;
    border-bottom: 2px solid rgba(43,35,24,0.18);
    background: transparent;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 26px;
    color: var(--ink);
    padding: 4px 2px 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--terracotta); }
  .field input::placeholder { color: rgba(43,35,24,0.3); font-style: italic; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 26px;
  }

  .time-input-wrap {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .time-input-wrap input { width: 70px; }
  .time-unit { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft); }

  .route-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
  }

  .plane-badge {
    font-size: 46px;
    line-height: 1;
    transform: rotate(90deg);
    margin-bottom: 14px;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
  }

  .stub-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
    margin-bottom: 4px;
  }

  .stub-city {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    text-align: center;
    min-height: 30px;
  }

  .board-btn {
    width: 100%;
    background: var(--terracotta);
    color: var(--paper);
    border: none;
    border-radius: 10px;
    padding: 15px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .board-btn:hover { background: #a8431f; }
  .board-btn:active { transform: scale(0.98); }
  .board-btn:disabled { opacity: 0.6; cursor: wait; }
  .flight-status {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 900px;
    margin-top: 26px;
    min-height: 60px;
  }

  .flight-path {
    position: relative;
    height: 50px;
    display: none;
  }
  .flight-path.active { display: block; }

  .flight-path svg { width: 100%; height: 100%; }
  .path-line {
    stroke: rgba(243,234,216,0.25);
    stroke-width: 2;
    stroke-dasharray: 6 8;
    fill: none;
  }

  .plane-icon {
    position: absolute;
    top: 50%;
    left: 0;
    font-size: 26px;
    transform: translate(-50%, -50%) rotate(90deg);
    animation: fly 2.6s ease-in-out infinite;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  @keyframes fly {
    0%   { left: 2%; }
    50%  { left: 96%; }
    100% { left: 2%; }
  }

  .status-text {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--gold-soft);
    margin-top: 10px;
    min-height: 18px;
  }

  .itinerary {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 900px;
    margin-top: 30px;
    display: none;
  }
  .itinerary.active { display: block; }

  .itinerary-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .itinerary-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 24px;
  }

  .itinerary-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gold-soft);
  }

  .explanation-card {
    background: rgba(243,234,216,0.08);
    border: 1px solid rgba(243,234,216,0.15);
    border-radius: 12px;
    padding: 18px 22px;
    font-size: 14.5px;
    line-height: 1.6;
    color: rgba(243,234,216,0.9);
    margin-bottom: 24px;
    font-style: italic;
  }
  .explanation-card::before {
    content: "✈ ";
    font-style: normal;
  }

  .stops {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .stop-card {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: center;
    gap: 18px;
    background: var(--paper);
    color: var(--ink);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 10px 24px -12px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(10px);
    animation: stampIn 0.5s ease forwards;
  }

  @keyframes stampIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .stop-index {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--terracotta);
    text-align: center;
    border-right: 2px dashed rgba(43,35,24,0.18);
    padding-right: 14px;
  }

  .stop-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 2px;
  }

  .stop-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--teal);
  }

  .stop-duration {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    text-align: right;
    white-space: nowrap;
  }

  .excluded-note {
    margin-top: 22px;
    font-size: 12.5px;
    color: rgba(243,234,216,0.5);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }

  .error-text {
    text-align: center;
    color: #e8846b;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-top: 12px;
  }

  @media (max-width: 640px) {
    .pass { grid-template-columns: 1fr; }
    .pass-stub {
      order: -1;
      flex-direction: row;
      gap: 16px;
    }
    .perforation, .notch { display: none; }
    .field-row { grid-template-columns: 1fr; gap: 14px; }
    .stop-card { grid-template-columns: 40px 1fr; }
    .stop-duration { grid-column: 2; text-align: left; }
  }
</style>
</head>
<body>
<div class="sky"></div>
<div class="stars"></div>
<div class="skyline">
  <svg viewBox="0 0 1440 190" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <g class="skyline-fill-2">
      <rect x="0" y="120" width="60" height="70"/>
      <rect x="70" y="100" width="40" height="90"/>
      <rect x="1330" y="110" width="50" height="80"/>
      <rect x="1385" y="90" width="55" height="100"/>
    </g>
    <g class="skyline-fill">
      <polygon points="150,190 175,60 180,40 185,60 210,190"/>
      <rect x="172" y="30" width="16" height="14"/>
      <polygon points="260,190 340,190 300,105"/>
      <polygon points="400,190 460,190 430,120"/>
      <path d="M520,190 L520,110 Q520,90 545,90 Q570,90 570,110 L570,190 L555,190 L555,120 Q555,105 545,105 Q535,105 535,120 L535,190 Z"/>
      <rect x="640" y="130" width="14" height="60"/>
      <ellipse cx="647" cy="118" rx="12" ry="16"/>
      <rect x="700" y="110" width="16" height="80"/>
      <ellipse cx="708" cy="96" rx="14" ry="18"/>
      <rect x="760" y="140" width="120" height="50"/>
      <ellipse cx="820" cy="140" rx="60" ry="34"/>
      <rect x="920" y="70" width="34" height="120"/>
      <rect x="960" y="100" width="28" height="90"/>
      <rect x="995" y="50" width="30" height="140"/>
      <polygon points="995,50 1010,20 1025,50"/>
      <rect x="1035" y="90" width="26" height="100"/>
      <rect x="1120" y="130" width="10" height="60"/>
      <rect x="1180" y="130" width="10" height="60"/>
      <rect x="1112" y="118" width="86" height="12"/>
      <rect x="1122" y="134" width="66" height="8"/>
      <polygon points="1240,190 1300,190 1270,135"/>
    </g>
  </svg>
</div>

<div class="top">
  <div class="eyebrow">Bir günlük bilet · One day, one route</div>
  <h1 class="brand">Day<em>Route</em> AI</h1>
  <p class="tagline">Şəhəri yaz, saatını seç — qalanını marşrut mühəndisinə burax</p>
</div>
<div class="pass-wrap">
  <div class="pass">
    <div class="perforation"></div>
    <div class="notch top"></div>
    <div class="notch bottom"></div>

    <div class="pass-main">
      <div class="field">
        <span class="row-label">Təyinat şəhər / Destination</span>
        <input type="text" id="cityInput" placeholder="məs. Roma, Bakı, Paris..." autocomplete="off">
      </div>

      <div class="field-row">
        <div class="field" style="margin-bottom:0;">
          <span class="row-label">Gün budcəsi / Time budget</span>
          <div class="time-input-wrap">
            <input type="number" id="timeInput" value="480" min="60" step="30">
            <span class="time-unit">dəqiqə</span>
          </div>
        </div>
        <div class="field" style="margin-bottom:0;">
          <span class="row-label">Marşrut kodu</span>
          <div class="route-code" id="routeCode">DR-—— · AWAITING INPUT</div>
        </div>
      </div>
    </div>

    <div class="pass-stub">
      <div>
        <div class="plane-badge">✈</div>
        <div class="stub-title">Boarding</div>
        <div class="stub-city" id="stubCity">—</div>
      </div>
      <button class="board-btn" id="boardBtn" onclick="generateRoute()">
        Marşrutu Yarat →
      </button>
    </div>
  </div>
</div>
<div class="flight-status">
  <div class="flight-path" id="flightPath">
    <svg viewBox="0 0 1000 50" preserveAspectRatio="none">
      <path class="path-line" d="M20,25 Q500,-10 980,25"/>
    </svg>
    <div class="plane-icon">✈</div>
  </div>
  <div class="status-text" id="statusText"></div>
</div>

<div class="itinerary" id="itinerary">
  <div class="itinerary-header">
    <div class="itinerary-title" id="itineraryTitle">Marşrutun</div>
    <div class="itinerary-meta" id="itineraryMeta"></div>
  </div>
  <div class="explanation-card" id="explanationCard"></div>
  <div class="stops" id="stops"></div>
  <div class="excluded-note" id="excludedNote"></div>
</div>

<script>
const API_BASE = "http://localhost:8000";

const cityInput = document.getElementById('cityInput');
const timeInput = document.getElementById('timeInput');
const routeCode = document.getElementById('routeCode');
const stubCity = document.getElementById('stubCity');
const boardBtn = document.getElementById('boardBtn');
const flightPath = document.getElementById('flightPath');
const statusText = document.getElementById('statusText');
const itinerary = document.getElementById('itinerary');
const itineraryTitle = document.getElementById('itineraryTitle');
const itineraryMeta = document.getElementById('itineraryMeta');
const explanationCard = document.getElementById('explanationCard');
const stopsEl = document.getElementById('stops');
const excludedNote = document.getElementById('excludedNote');

function randCode() {
  const n = Math.floor(100 + Math.random() * 900);
  return `DR-${n}`;
}

cityInput.addEventListener('input', () => {
  const val = cityInput.value.trim();
  stubCity.textContent = val || '—';
  routeCode.textContent = val ? `${randCode()} · READY TO BOARD` : 'DR-—— · AWAITING INPUT';
});

async function generateRoute() {
  const city = cityInput.value.trim();
  const timeLimit = parseInt(timeInput.value, 10) || 480;

  if (!city) {
    cityInput.focus();
    cityInput.style.borderColor = '#c1502e';
    setTimeout(() => { cityInput.style.borderColor = ''; }, 900);
    return;
  }

  boardBtn.disabled = true;
  boardBtn.textContent = 'Uçuş hazırlanır...';
  flightPath.classList.add('active');
  itinerary.classList.remove('active');
  statusText.textContent = `${city.toUpperCase()} ÜÇÜN YERLƏR AXTARILIR...`;

  try {
    const discoverRes = await fetch(`${API_BASE}/discover`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ city })
    });

    if (!discoverRes.ok) {
      const errData = await discoverRes.json().catch(() => null);
      throw new Error(errData?.detail || 'Yerləri tapmaq mümkün olmadı');
    }

    statusText.textContent = 'MARŞRUT HESABLANIR VƏ İZAH YAZILIR...';

    const routeRes = await fetch(`${API_BASE}/route/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ city, time_limit_minutes: timeLimit })
    });

    if (!routeRes.ok) {
      const errData = await routeRes.json().catch(() => null);
      throw new Error(errData?.detail || 'Marşrut yaratmaq mümkün olmadı');
    }

    const data = await routeRes.json();
    renderItinerary(city, data);
    statusText.textContent = 'ENİŞ TAMAMLANDI';
    setTimeout(() => { flightPath.classList.remove('active'); statusText.textContent=''; }, 1200);

  } catch (err) {
    statusText.textContent = '';
    flightPath.classList.remove('active');
    excludedNote.textContent = '';
    explanationCard.textContent = '';
    stopsEl.innerHTML = `<div class="error-text">${err.message}</div>`;
    itinerary.classList.add('active');
  } finally {
    boardBtn.disabled = false;
    boardBtn.textContent = 'Marşrutu Yarat →';
  }
}

function renderItinerary(city, data) {
  itineraryTitle.textContent = `${city} · Bir Günlük Marşrut`;
  itineraryMeta.textContent = `${data.total_time_minutes} / ${data.time_limit_minutes} DƏQİQƏ`;
  explanationCard.textContent = data.explanation;

  stopsEl.innerHTML = '';
  data.selected_places.forEach((place, idx) => {
    const card = document.createElement('div');
    card.className = 'stop-card';
    card.style.animationDelay = `${idx * 0.08}s`;
    card.innerHTML = `
      <div class="stop-index">${String(idx + 1).padStart(2, '0')}</div>
      <div>
        <div class="stop-name">${place.name}</div>
        <div class="stop-category">${place.category}</div>
      </div>
      <div class="stop-duration">${place.visit_duration_minutes} dəq</div>
    `;
    stopsEl.appendChild(card);
  });

  if (data.excluded_places && data.excluded_places.length > 0) {
    const names = data.excluded_places.map(p => p.name).join(', ');
    excludedNote.textContent = `Vaxta sığmadı: ${names}`;
  } else {
    excludedNote.textContent = '';
  }

  itinerary.classList.add('active');
}

cityInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') generateRoute();
});
</script>
</body>
</html>
